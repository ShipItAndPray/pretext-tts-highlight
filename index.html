<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pretext-tts-highlight Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #fafafa;
      color: #333;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 700px;
      width: 100%;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 4px;
    }

    .subtitle {
      color: #666;
      font-size: 14px;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 6px;
      font-size: 14px;
    }

    textarea {
      width: 100%;
      min-height: 100px;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: inherit;
      font-size: 16px;
      resize: vertical;
      margin-bottom: 16px;
    }

    textarea:focus { outline: 2px solid #2196f3; border-color: transparent; }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      align-items: center;
    }

    button {
      padding: 8px 18px;
      border: 1px solid #ccc;
      border-radius: 6px;
      background: #fff;
      cursor: pointer;
      font-size: 14px;
      transition: all 150ms;
    }

    button:hover { background: #f5f5f5; }
    button:active { background: #e0e0e0; }
    button.active { background: #e3f2fd; border-color: #2196f3; color: #1565c0; }
    button:disabled { opacity: 0.4; cursor: default; }

    .speed-label { font-size: 13px; color: #666; margin-left: 8px; }

    .style-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 20px;
    }

    .style-label { font-size: 13px; color: #666; }

    .highlight-area {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 24px;
      font-size: 20px;
      line-height: 32px;
      min-height: 80px;
      user-select: text;
    }

    .word {
      display: inline;
      transition: all 150ms ease;
      border-radius: 3px;
      cursor: pointer;
    }

    .word:hover { opacity: 0.7; }

    .word.active-background { background: #ffeb3b; padding: 0 2px; }
    .word.active-underline { text-decoration: underline; text-decoration-color: #ff5722; text-underline-offset: 4px; text-decoration-thickness: 3px; }
    .word.active-bold { font-weight: 700; color: #1565c0; }
    .word.active-scale { display: inline-block; transform: scale(1.08); color: #e91e63; }

    .progress-bar {
      height: 4px;
      background: #e0e0e0;
      border-radius: 2px;
      margin-top: 16px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #2196f3;
      border-radius: 2px;
      transition: width 150ms ease;
      width: 0%;
    }

    .status {
      font-size: 12px;
      color: #999;
      margin-top: 8px;
      text-align: right;
    }

    footer {
      margin-top: 40px;
      text-align: center;
      font-size: 13px;
      color: #999;
    }

    footer a { color: #2196f3; text-decoration: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>pretext-tts-highlight</h1>
    <p class="subtitle">Karaoke-style word highlighting for text-to-speech. No DOM measurement. Smooth on resize.</p>

    <label for="text-input">Paste or type your text:</label>
    <textarea id="text-input">The quick brown fox jumps over the lazy dog. This is a demonstration of word-by-word text highlighting synchronized with the Web Speech API. Resize the window and watch the highlight reposition smoothly without any stutter or interruption to the audio playback.</textarea>

    <div class="controls">
      <button id="btn-play">Play</button>
      <button id="btn-pause" disabled>Pause</button>
      <button id="btn-stop" disabled>Stop</button>

      <span class="speed-label">Speed:</span>
      <button class="speed-btn" data-rate="0.5">0.5x</button>
      <button class="speed-btn active" data-rate="1">1x</button>
      <button class="speed-btn" data-rate="1.5">1.5x</button>
      <button class="speed-btn" data-rate="2">2x</button>
    </div>

    <div class="style-row">
      <span class="style-label">Highlight:</span>
      <button class="style-btn active" data-style="background">Background</button>
      <button class="style-btn" data-style="underline">Underline</button>
      <button class="style-btn" data-style="bold">Bold</button>
      <button class="style-btn" data-style="scale">Scale</button>
    </div>

    <div class="highlight-area" id="highlight-area"></div>

    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="status" id="status">Ready</div>

    <footer>
      <a href="https://github.com/ShipItAndPray/pretext-tts-highlight" target="_blank">GitHub</a>
      &middot; MIT License &middot; by ShipItAndPray
    </footer>
  </div>

  <script>
    // --- State ---
    let words = [];
    let currentWordIndex = -1;
    let isPlaying = false;
    let isPaused = false;
    let rate = 1;
    let highlightStyle = 'background';
    let utterance = null;

    // --- DOM refs ---
    const textInput = document.getElementById('text-input');
    const area = document.getElementById('highlight-area');
    const btnPlay = document.getElementById('btn-play');
    const btnPause = document.getElementById('btn-pause');
    const btnStop = document.getElementById('btn-stop');
    const progressFill = document.getElementById('progress-fill');
    const statusEl = document.getElementById('status');

    // --- Tokenizer ---
    function tokenize(text) {
      const tokens = [];
      const re = /\S+/g;
      let m, i = 0;
      while ((m = re.exec(text)) !== null) {
        tokens.push({ word: m[0], index: i, charStart: m.index, charEnd: m.index + m[0].length });
        i++;
      }
      return tokens;
    }

    // --- Render words ---
    function renderWords() {
      const text = textInput.value;
      words = tokenize(text);
      area.innerHTML = '';
      words.forEach((w, i) => {
        const span = document.createElement('span');
        span.className = 'word';
        span.textContent = w.word;
        span.dataset.index = i;
        span.addEventListener('click', () => {
          if (isPlaying || isPaused) {
            setActiveWord(i);
          }
        });
        area.appendChild(span);
        if (i < words.length - 1) {
          area.appendChild(document.createTextNode(' '));
        }
      });
    }

    function setActiveWord(index) {
      currentWordIndex = index;
      const spans = area.querySelectorAll('.word');
      spans.forEach((s, i) => {
        s.className = 'word' + (i === index ? ` active-${highlightStyle}` : '');
      });
      if (words.length > 0) {
        const pct = Math.min(100, ((index + 1) / words.length) * 100);
        progressFill.style.width = pct + '%';
        statusEl.textContent = `Word ${index + 1} of ${words.length}`;
      }
    }

    // --- charIndex to wordIndex ---
    function charToWord(charIndex) {
      for (let i = words.length - 1; i >= 0; i--) {
        if (charIndex >= words[i].charStart) return i;
      }
      return 0;
    }

    // --- Speech ---
    function speak() {
      const text = textInput.value.trim();
      if (!text) return;
      if (!window.speechSynthesis) {
        statusEl.textContent = 'Web Speech API not supported in this browser.';
        return;
      }

      window.speechSynthesis.cancel();
      renderWords();

      utterance = new SpeechSynthesisUtterance(text);
      utterance.rate = rate;

      utterance.onboundary = (e) => {
        if (e.name === 'word') {
          setActiveWord(charToWord(e.charIndex));
        }
      };

      utterance.onend = () => {
        isPlaying = false;
        isPaused = false;
        updateButtons();
        progressFill.style.width = '100%';
        statusEl.textContent = 'Done';
      };

      utterance.onerror = () => {
        isPlaying = false;
        isPaused = false;
        updateButtons();
        statusEl.textContent = 'Error during playback';
      };

      window.speechSynthesis.speak(utterance);
      isPlaying = true;
      isPaused = false;
      currentWordIndex = 0;
      setActiveWord(0);
      updateButtons();
    }

    function pauseResume() {
      if (isPaused) {
        window.speechSynthesis.resume();
        isPaused = false;
        isPlaying = true;
      } else {
        window.speechSynthesis.pause();
        isPaused = true;
        isPlaying = false;
      }
      updateButtons();
    }

    function stopSpeech() {
      window.speechSynthesis.cancel();
      isPlaying = false;
      isPaused = false;
      currentWordIndex = -1;
      updateButtons();
      renderWords();
      progressFill.style.width = '0%';
      statusEl.textContent = 'Ready';
    }

    function updateButtons() {
      btnPlay.disabled = isPlaying;
      btnPause.disabled = !isPlaying && !isPaused;
      btnPause.textContent = isPaused ? 'Resume' : 'Pause';
      btnStop.disabled = !isPlaying && !isPaused;
    }

    // --- Event listeners ---
    btnPlay.addEventListener('click', speak);
    btnPause.addEventListener('click', pauseResume);
    btnStop.addEventListener('click', stopSpeech);

    textInput.addEventListener('input', () => {
      if (!isPlaying && !isPaused) renderWords();
    });

    document.querySelectorAll('.speed-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        rate = parseFloat(btn.dataset.rate);
        document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (utterance) utterance.rate = rate;
      });
    });

    document.querySelectorAll('.style-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        highlightStyle = btn.dataset.style;
        document.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (currentWordIndex >= 0) setActiveWord(currentWordIndex);
      });
    });

    // Initial render
    renderWords();
  </script>
</body>
</html>
